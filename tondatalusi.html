<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Tonda Talusi - Smart Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .active-link { @apply bg-indigo-700 border-l-4 border-yellow-400; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        #media-modal { display: none; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="media-modal" class="fixed inset-0 bg-black/90 z-[200] items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl h-[80vh] rounded-2xl overflow-hidden flex flex-col relative">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h3 id="modal-title" class="font-bold text-indigo-900 truncate pr-8">Media Pembelajaran</h3>
                <button onclick="closeMedia()" class="text-red-500 hover:text-red-700 text-2xl font-bold">&times;</button>
            </div>
            <div id="modal-body" class="flex-1 bg-black"></div>
        </div>
    </div>

    <div id="auth-overlay" class="fixed inset-0 bg-indigo-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-yellow-400">
            <div class="text-center mb-8">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Lambang_Kabupaten_Donggala_%282015-sekarang%29.png" class="h-16 mx-auto mb-4 object-contain">
                <h2 class="text-2xl font-bold text-indigo-900 leading-tight">Komunitas Belajar<br>Tonda Talusi</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="email@belajar.id" class="w-full p-3 border-2 rounded-xl outline-none focus:border-indigo-500">
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-3 border-2 rounded-xl outline-none focus:border-indigo-500">
                <button onclick="handleLogin()" id="btn-login" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 transition">MASUK</button>
            </div>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-indigo-950 text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 text-xl font-bold border-b border-indigo-900 uppercase tracking-wider">Tonda Talusi</div>
            <nav id="sidebar-nav" class="flex-1 p-4 space-y-1 overflow-y-auto hide-scroll">
                
                <div id="nav-admin" class="hidden py-2 border-b border-indigo-900/50 mb-2">
                    <p class="px-3 text-[10px] font-bold text-yellow-400 uppercase mb-2">Kontrol Admin</p>
                    <button onclick="showSection('admin-users')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center"><i class="fa fa-users-cog w-6"></i>Kelola User</button>
                    <button onclick="showSection('monitor-aktivitas')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center"><i class="fa fa-chart-line w-6"></i>Rekap Belajar</button>
                </div>

                <div id="nav-guru" class="hidden py-2 border-b border-indigo-900/50 mb-2">
                    <p class="px-3 text-[10px] font-bold text-indigo-400 uppercase mb-2">Panel Guru</p>
                    <button onclick="showSection('guru-materi')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center"><i class="fa fa-upload w-6"></i>Kelola Materi</button>
                    <button onclick="showSection('guru-ujian')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center"><i class="fa fa-edit w-6"></i>Kelola Ujian</button>
                </div>

                <div id="nav-siswa" class="hidden py-2">
                    <p class="px-3 text-[10px] font-bold text-indigo-400 uppercase mb-2">Pembelajaran</p>
                    <button onclick="showSection('siswa-materi')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center"><i class="fa fa-book w-6"></i>Materi Belajar</button>
                    <button onclick="showSection('siswa-ujian')" class="w-full text-left p-3 hover:bg-indigo-800 rounded-lg flex items-center"><i class="fa fa-pen-nib w-6"></i>Ujian & Kuis</button>
                </div>
            </nav>

            <div class="p-4 bg-black/20">
                <div id="user-display" class="text-sm font-bold text-yellow-400 mb-1 truncate">Memuat...</div>
                <div id="role-badge" class="text-[10px] bg-indigo-700 px-2 py-0.5 rounded mb-3 inline-block uppercase font-bold">Role</div>
                <button onclick="handleLogout()" class="w-full bg-red-600/20 text-red-400 p-2 rounded text-xs border border-red-600/20 hover:bg-red-600 hover:text-white transition">KELUAR</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white p-5 shadow-sm sticky top-0 z-40 flex justify-between items-center">
                <h2 id="section-title" class="text-xl font-bold text-indigo-900 uppercase">Selamat Datang</h2>
                <div id="timer-box" class="hidden bg-red-600 text-white px-4 py-2 rounded-full font-mono animate-pulse">
                    <i class="fa fa-clock mr-2"></i><span id="timer-count">00:00</span>
                </div>
            </header>
            <div id="main-content" class="p-6 max-w-6xl mx-auto w-full">
                <div class="text-center py-20 text-gray-400">
                    <i class="fa fa-spinner fa-spin text-4xl mb-4"></i>
                    <p>Menyiapkan ruang belajar...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu4HfC2TQGf_LZPIDRiW-02iZiXeKo6js",
            authDomain: "kombeltondatalusi.firebaseapp.com",
            databaseURL: "https://kombeltondatalusi-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "kombeltondatalusi",
            storageBucket: "kombeltondatalusi.firebasestorage.app",
            messagingSenderId: "490296730086",
            appId: "1:490296730086:web:c5e9250de6230bf8a4b627"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        const SUPER_ADMIN_EMAIL = "abd.fajar81@guru.belajar.id";
        let userSession = null, activeTimer = null;

        // --- AUTH LOGIC ---
        async function handleLogin() {
            const btn = document.getElementById('btn-login');
            const e = document.getElementById('login-email').value.trim(); 
            const p = document.getElementById('login-pass').value;
            
            if(!e || !p) return alert("Email dan Password harus diisi!");
            
            btn.disabled = true;
            btn.innerText = "PROSES...";

            try { 
                await auth.signInWithEmailAndPassword(e, p); 
            } catch(err) { 
                alert("Login Gagal: " + err.message); 
                btn.disabled = false;
                btn.innerText = "MASUK";
            }
        }

        function handleLogout() { 
            if(confirm("Keluar dari sistem?")) {
                auth.signOut().then(() => location.reload()); 
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                
                db.ref('users').orderByChild('email').equalTo(user.email.toLowerCase()).once('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const key = Object.keys(data)[0];
                        userSession = data[key];
                    } else {
                        // Jika user baru login tapi belum ada di DB (registrasi manual oleh admin)
                        userSession = { 
                            name: user.email.split('@')[0], 
                            role: 'siswa', 
                            email: user.email.toLowerCase() 
                        };
                    }

                    // Force Super Admin Check
                    if(user.email.toLowerCase() === SUPER_ADMIN_EMAIL.toLowerCase()) {
                        userSession.role = "superadmin";
                    }

                    userSession.uid = user.uid;
                    document.getElementById('user-display').innerText = userSession.name;
                    document.getElementById('role-badge').innerText = userSession.role;
                    
                    setupNavigation(userSession.role);
                    
                    // Default Page
                    if(userSession.role === 'siswa') showSection('siswa-materi');
                    else showSection('guru-materi');
                });
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
            }
        });

        function setupNavigation(role) {
            document.getElementById('nav-admin').classList.add('hidden');
            document.getElementById('nav-guru').classList.add('hidden');
            document.getElementById('nav-siswa').classList.add('hidden');

            if(role === 'superadmin' || role === 'admin') {
                document.getElementById('nav-admin').classList.remove('hidden');
                document.getElementById('nav-guru').classList.remove('hidden');
                document.getElementById('nav-siswa').classList.remove('hidden');
            } else if(role === 'guru') {
                document.getElementById('nav-guru').classList.remove('hidden');
                document.getElementById('nav-siswa').classList.remove('hidden');
            } else {
                document.getElementById('nav-siswa').classList.remove('hidden');
            }
        }

        // --- ROUTER & UI ---
        function showSection(id) {
            const content = document.getElementById('main-content');
            document.getElementById('section-title').innerText = id.replace(/-/g, ' ').toUpperCase();
            
            // Clear timer if navigating away from exam
            if(activeTimer) {
                clearInterval(activeTimer);
                document.getElementById('timer-box').classList.add('hidden');
            }

            if (id === 'admin-users') {
                content.innerHTML = `
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl border shadow-sm h-fit">
                            <h3 class="font-bold mb-4">Tambah Pengguna</h3>
                            <div class="space-y-3">
                                <input id="reg-name" placeholder="Nama Lengkap" class="w-full p-2 border rounded">
                                <input id="reg-email" placeholder="Email (Harus sesuai Auth)" class="w-full p-2 border rounded">
                                <select id="reg-role" class="w-full p-2 border rounded">
                                    <option value="siswa">Siswa</option>
                                    <option value="guru">Guru</option>
                                    <option value="admin">Admin</option>
                                </select>
                                <button onclick="adminCreateUser()" class="w-full bg-indigo-600 text-white p-2 rounded font-bold">DAFTARKAN</button>
                            </div>
                        </div>
                        <div class="md:col-span-2 bg-white p-6 rounded-xl border shadow-sm">
                            <h3 class="font-bold mb-4 text-indigo-900">Daftar Pengguna</h3>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="bg-gray-50 border-b">
                                        <tr><th class="p-3 text-xs">Nama</th><th class="p-3 text-xs">Role</th><th class="p-3 text-xs">Aksi</th></tr>
                                    </thead>
                                    <tbody id="user-list-table"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;
                fetchUserList();
            }
            else if (id === 'guru-materi') {
                content.innerHTML = `
                    <div class="bg-white p-6 rounded-xl border mb-6 shadow-sm">
                        <h3 class="font-bold mb-4 text-indigo-900">Input Materi Baru</h3>
                        <div class="space-y-3">
                            <input id="m-id" type="hidden">
                            <input id="m-title" placeholder="Judul Materi" class="w-full p-2 border rounded">
                            <textarea id="m-desc" placeholder="Deskripsi materi..." class="w-full p-2 border rounded h-24"></textarea>
                            <input id="m-link" placeholder="Link YouTube / Google Drive" class="w-full p-2 border rounded">
                            <button onclick="saveMateri()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">SIMPAN MATERI</button>
                        </div>
                    </div>
                    <div id="materi-manage-list" class="space-y-2"></div>`;
                fetchMateriControl();
            } 
            else if (id === 'guru-ujian') {
                content.innerHTML = `
                    <div class="bg-white p-6 rounded-xl border mb-6 shadow-sm">
                        <h3 class="font-bold mb-4 text-indigo-900">Buat Paket Ujian</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <input id="q-id" type="hidden">
                            <input id="q-title" placeholder="Judul Ujian" class="p-2 border rounded">
                            <select id="q-cat" class="p-2 border rounded">
                                <option value="Ujian Harian">Ujian Harian</option>
                                <option value="UTS">UTS</option>
                                <option value="UAS">UAS</option>
                            </select>
                            <input id="q-dur" type="number" placeholder="Durasi (Menit)" class="p-2 border rounded">
                        </div>
                        <div id="q-container" class="space-y-4"></div>
                        <div class="mt-4 flex gap-2">
                            <button onclick="addQField()" class="bg-yellow-500 text-white px-4 py-2 rounded font-bold">+ Tambah Soal</button>
                            <button onclick="saveQuiz()" class="bg-indigo-600 text-white px-4 py-2 rounded font-bold">PUBLIKASIKAN</button>
                        </div>
                    </div>
                    <div id="quiz-manage-list" class="space-y-2"></div>`;
                addQField();
                fetchQuizControl();
            } 
            else if (id === 'siswa-materi') {
                content.innerHTML = `<div id="siswa-materi-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>`;
                fetchMateriSiswa();
            } 
            else if (id === 'siswa-ujian') {
                content.innerHTML = `<div id="siswa-quiz-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>`;
                fetchQuizSiswa();
            }
            else if (id === 'monitor-aktivitas') {
                content.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold">Rekapitulasi Hasil Belajar</h3>
                        <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-1 rounded text-sm"><i class="fa fa-file-excel mr-2"></i>Export Excel</button>
                    </div>
                    <div id="report-container" class="space-y-2"></div>`;
                fetchReports();
            }
        }

        // --- LOGIKA DATABASE (CRUD) ---

        // User Management
        function adminCreateUser() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value.toLowerCase().trim();
            const role = document.getElementById('reg-role').value;
            if(!name || !email) return alert("Isi data dengan lengkap!");

            db.ref('users').push({ name, email, role }).then(() => {
                alert("User terdaftar di database!");
                showSection('admin-users');
            });
        }

        function fetchUserList() {
            db.ref('users').on('value', snap => {
                const list = document.getElementById('user-list-table');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    if(u.email !== SUPER_ADMIN_EMAIL) {
                        list.innerHTML += `<tr class="border-b">
                            <td class="p-3 font-bold text-sm">${u.name}<br><span class="text-[10px] text-gray-400 font-normal">${u.email}</span></td>
                            <td class="p-3 uppercase text-[10px] font-bold">${u.role}</td>
                            <td class="p-3"><button onclick="deleteUser('${child.key}')" class="text-red-500 hover:text-red-700"><i class="fa fa-trash"></i></button></td>
                        </tr>`;
                    }
                });
            });
        }
        function deleteUser(key) { if(confirm("Hapus user ini?")) db.ref('users/'+key).remove(); }

        // Materi
        function saveMateri() {
            const id = document.getElementById('m-id').value;
            const data = {
                title: document.getElementById('m-title').value,
                desc: document.getElementById('m-desc').value,
                link: document.getElementById('m-link').value,
                teacher: userSession.name,
                date: new Date().toLocaleString()
            };
            if(!data.title) return alert("Judul wajib diisi!");
            const ref = id ? db.ref('materials/' + id) : db.ref('materials').push();
            ref.set(data).then(() => { alert("Materi tersimpan!"); showSection('guru-materi'); });
        }

        function fetchMateriControl() {
            db.ref('materials').on('value', snap => {
                const list = document.getElementById('materi-manage-list');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    list.innerHTML += `<div class="bg-white p-4 border rounded flex justify-between shadow-sm">
                        <div><b class="text-indigo-900">${m.title}</b><p class="text-[10px] text-gray-400">Oleh: ${m.teacher}</p></div>
                        <div class="flex gap-3">
                            <button onclick="editM('${child.key}')" class="text-blue-500"><i class="fa fa-edit"></i></button>
                            <button onclick="deleteM('${child.key}')" class="text-red-500"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>`;
                });
            });
        }
        function deleteM(id) { if(confirm("Hapus materi ini?")) db.ref('materials/'+id).remove(); }
        function editM(id) {
            db.ref('materials/'+id).once('value', snap => {
                const m = snap.val();
                document.getElementById('m-id').value = id;
                document.getElementById('m-title').value = m.title;
                document.getElementById('m-desc').value = m.desc;
                document.getElementById('m-link').value = m.link;
            });
        }

        // Quiz
        function addQField(val = {q: '', opt: ['', '', '', ''], ans: 0}) {
            const container = document.getElementById('q-container');
            const d = document.createElement('div');
            d.className = "p-4 bg-gray-50 rounded-lg border q-item";
            d.innerHTML = `
                <input class="w-full p-2 border mb-2 q-txt font-bold" placeholder="Pertanyaan..." value="${val.q}">
                <div class="grid grid-cols-2 gap-2">
                    ${val.opt.map((o, i) => `<input class="p-2 border q-opt text-sm" placeholder="Opsi ${String.fromCharCode(65+i)}" value="${o}">`).join('')}
                </div>
                <div class="mt-2 text-xs font-bold text-gray-500">Kunci: 
                    <select class="p-1 border q-ans ml-2"><option value="0" ${val.ans==0?'selected':''}>A</option><option value="1" ${val.ans==1?'selected':''}>B</option><option value="2" ${val.ans==2?'selected':''}>C</option><option value="3" ${val.ans==3?'selected':''}>D</option></select>
                </div>`;
            container.appendChild(d);
        }

        function saveQuiz() {
            const id = document.getElementById('q-id').value;
            const questions = [];
            document.querySelectorAll('.q-item').forEach(item => {
                const qText = item.querySelector('.q-txt').value;
                if(qText) {
                    const opts = []; item.querySelectorAll('.q-opt').forEach(o => opts.push(o.value));
                    questions.push({ q: qText, opt: opts, ans: parseInt(item.querySelector('.q-ans').value) });
                }
            });
            const data = {
                title: document.getElementById('q-title').value,
                category: document.getElementById('q-cat').value,
                duration: parseInt(document.getElementById('q-dur').value) || 30,
                questions, teacher: userSession.name
            };
            const ref = id ? db.ref('quizzes/' + id) : db.ref('quizzes').push();
            ref.set(data).then(() => { alert("Ujian dipublikasikan!"); showSection('guru-ujian'); });
        }

        function fetchQuizControl() {
            db.ref('quizzes').on('value', snap => {
                const list = document.getElementById('quiz-manage-list');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const q = child.val();
                    list.innerHTML += `<div class="bg-white p-4 border rounded flex justify-between items-center shadow-sm">
                        <div><b>${q.title}</b><p class="text-[10px] text-gray-400">${q.questions.length} Soal | ${q.duration} Menit</p></div>
                        <div class="flex gap-3">
                            <button onclick="deleteQ('${child.key}')" class="text-red-500"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>`;
                });
            });
        }
        function deleteQ(id) { if(confirm("Hapus ujian ini?")) db.ref('quizzes/'+id).remove(); }

        // --- SISWA INTERFACE ---
        function fetchMateriSiswa() {
            db.ref('materials').on('value', snap => {
                const list = document.getElementById('siswa-materi-list');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    list.innerHTML += `<div class="bg-white p-5 rounded-xl shadow-sm border">
                        <h4 class="font-bold text-indigo-900">${m.title}</h4>
                        <p class="text-xs text-gray-500 my-2 line-clamp-3">${m.desc || 'Tidak ada deskripsi.'}</p>
                        <div class="flex justify-between items-center mt-4 pt-4 border-t">
                            <span class="text-[10px] text-gray-400">Oleh: ${m.teacher}</span>
                            ${m.link ? `<button onclick="openMedia('${m.title}', '${m.link}')" class="text-indigo-600 font-bold text-xs"><i class="fa fa-play-circle"></i> BUKA MATERI</button>` : ''}
                        </div>
                    </div>`;
                });
            });
        }

        function fetchQuizSiswa() {
            db.ref('quizzes').on('value', snap => {
                const list = document.getElementById('siswa-quiz-list');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const q = child.val();
                    list.innerHTML += `<div class="bg-white p-5 rounded-xl border shadow-sm">
                        <span class="text-[9px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded font-bold uppercase">${q.category}</span>
                        <h4 class="font-bold text-indigo-900 mt-2">${q.title}</h4>
                        <p class="text-[10px] text-gray-400 mb-4">${q.duration} Menit | ${q.questions.length} Soal</p>
                        <button onclick="startExam('${child.key}')" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold text-xs hover:bg-indigo-700">MULAI UJIAN</button>
                    </div>`;
                });
            });
        }

        function startExam(id) {
            db.ref('quizzes/'+id).once('value', snap => {
                const q = snap.val();
                let time = q.duration * 60;
                document.getElementById('timer-box').classList.remove('hidden');
                
                activeTimer = setInterval(() => {
                    let m = Math.floor(time / 60), s = time % 60;
                    document.getElementById('timer-count').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                    if(time <= 0) { clearInterval(activeTimer); submitExam(id, true); }
                    time--;
                }, 1000);

                document.getElementById('main-content').innerHTML = `
                    <div class="max-w-3xl mx-auto">
                        <h3 class="text-2xl font-bold mb-6 text-indigo-900">${q.title}</h3>
                        ${q.questions.map((item, idx) => `
                            <div class="bg-white p-6 rounded-xl border mb-4 shadow-sm">
                                <p class="font-bold mb-4">${idx+1}. ${item.q}</p>
                                <div class="space-y-2">
                                    ${item.opt.map((o, i) => `
                                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-indigo-50 transition">
                                            <input type="radio" name="ans${idx}" value="${i}" class="mr-3 w-4 h-4"> ${o}
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="submitExam('${id}')" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold hover:bg-green-700 transition mb-20 shadow-lg">KIRIM JAWABAN</button>
                    </div>`;
                window.scrollTo(0,0);
            });
        }

        async function submitExam(quizId, auto = false) {
            if(!auto && !confirm("Kirim jawaban Anda sekarang?")) return;
            
            clearInterval(activeTimer);
            document.getElementById('timer-box').classList.add('hidden');
            
            const snap = await db.ref('quizzes/' + quizId).once('value');
            const quiz = snap.val();
            let correct = 0;

            quiz.questions.forEach((q, idx) => {
                const sel = document.querySelector(`input[name="ans${idx}"]:checked`);
                if (sel && parseInt(sel.value) === q.ans) correct++;
            });

            const finalScore = Math.round((correct / quiz.questions.length) * 100);
            
            db.ref('reports').push({
                studentName: userSession.name,
                quizTitle: quiz.title,
                category: quiz.category,
                score: finalScore,
                date: new Date().toLocaleString()
            }).then(() => {
                alert(`Ujian Selesai! Skor Anda: ${finalScore}`);
                showSection('siswa-ujian');
            });
        }

        // --- MEDIA & REPORTING ---
        function openMedia(title, url) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = title;
            let embedUrl = url;
            
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const vidId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
                embedUrl = `https://www.youtube.com/embed/${vidId}`;
            } else if (url.includes('drive.google.com')) {
                embedUrl = url.replace('/view', '/preview').replace('/edit', '/preview');
            }

            body.innerHTML = `<iframe src="${embedUrl}" class="w-full h-full" allowfullscreen frameborder="0"></iframe>`;
            document.getElementById('media-modal').classList.add('modal-active');
        }

        function closeMedia() { 
            document.getElementById('media-modal').classList.remove('modal-active'); 
            document.getElementById('modal-body').innerHTML = "";
        }

        function fetchReports() {
            db.ref('reports').on('value', snap => {
                const list = document.getElementById('report-container');
                if(!list) return; list.innerHTML = "";
                snap.forEach(child => {
                    const r = child.val();
                    list.innerHTML += `<div class="bg-white p-4 rounded-lg border flex justify-between items-center shadow-sm">
                        <div><p class="font-bold text-indigo-900">${r.studentName}</p><p class="text-[10px] text-gray-500">${r.category}: ${r.quizTitle} • ${r.date}</p></div>
                        <div class="text-2xl font-black ${r.score >= 70 ? 'text-green-600' : 'text-red-600'}">${r.score}</div>
                    </div>`;
                });
            });
        }

        function exportToExcel() {
            const data = [];
            db.ref('reports').once('value', snap => {
                snap.forEach(c => {
                    const r = c.val();
                    data.push({ "Nama": r.studentName, "Kategori": r.category, "Ujian": r.quizTitle, "Skor": r.score, "Tanggal": r.date });
                });
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Nilai");
                XLSX.writeFile(wb, "Rekap_Nilai_TondaTalusi.xlsx");
            });
        }
    </script>
</body>
