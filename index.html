<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM LMS TERPADU SMP - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .exam-overlay { background: #0f172a; position: fixed; inset: 0; z-index: 999; color: white; }
    </style>
</head>
<body class="bg-gray-50" x-data="lmsApp()" x-init="initFirebase()">

    <div x-show="!isLoggedIn" x-cloak class="min-h-screen flex items-center justify-center bg-blue-800 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-bold text-blue-700">LMS SMP</h2>
                <p class="text-gray-500">Masuk dengan akun terdaftar</p>
            </div>
            <div class="space-y-4">
                <input type="email" x-model="authEmail" placeholder="Email" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" x-model="authPass" placeholder="Password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="handleLogin()" :disabled="loading" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">
                    <span x-text="loading ? 'Memproses...' : 'Login'"></span>
                </button>
                <p x-show="errorMsg" class="text-red-500 text-xs text-center" x-text="errorMsg"></p>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak>
        <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
                <div class="flex items-center space-x-8">
                    <span class="font-black text-blue-600 text-xl">LMS-SMP</span>
                    <div class="hidden md:flex space-x-4 text-sm font-medium text-gray-600">
                        <a href="#" @click="currentTab = 'home'" class="hover:text-blue-600">Beranda</a>
                        <template x-if="['kadis', 'admin'].includes(role)">
                            <a href="#" @click="currentTab = 'register'" class="text-green-600 font-bold">Tambah User</a>
                        </template>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-bold leading-none" x-text="userName"></p>
                        <span class="text-[10px] uppercase font-bold text-gray-400" x-text="role"></span>
                    </div>
                    <button @click="handleLogout()" class="text-red-500 hover:bg-red-50 p-2 rounded-lg text-sm font-bold">Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            
            <div x-show="currentTab === 'home'">
                <p class="text-gray-600">Selamat datang, <span class="font-bold" x-text="userName"></span>. Silakan pilih menu di atas.</p>
            </div>

            <div x-show="currentTab === 'register'" class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-sm border">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Pendaftaran User Baru</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="email" x-model="regEmail" placeholder="Email Baru" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                        <input type="password" x-model="regPass" placeholder="Password (min 6 char)" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <input type="text" x-model="regNama" placeholder="Nama Lengkap" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <select x-model="regRole" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                            <option value="siswa">Siswa</option>
                            <option value="guru">Guru</option>
                            <option value="kepsek">Kepala Sekolah</option>
                            <option value="pengawas">Pengawas</option>
                            <option value="kadis">Kadis Pendidikan</option>
                        </select>
                        <input type="text" x-model="regSekolah" placeholder="Nama Sekolah" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                    </div>

                    <button @click="handleRegister()" :disabled="loading" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">
                        <span x-text="loading ? 'Mendaftarkan...' : 'Daftarkan Akun'"></span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyAQCxzDVE4Uma-oNSr2wDw2WzcgDrT6ols",
            authDomain: "lmssmpterpadu.firebaseapp.com",
            databaseURL: "https://lmssmpterpadu-default-rtdb.firebaseio.com", // Sesuaikan URL DB Anda
            projectId: "lmssmpterpadu",
        };

        function lmsApp() {
            return {
                isLoggedIn: false,
                loading: false,
                currentTab: 'home',
                // Login State
                authEmail: '', authPass: '', errorMsg: '',
                userName: '', role: '',
                // Register State
                regEmail: '', regPass: '', regNama: '', regRole: 'siswa', regSekolah: '',
                sheetUrl: 'https://script.google.com/macros/s/AKfycbzNxPiGRQ5mMYT_-5aTv1bFwyXqGoKwp53mZciiDdKV6W6UGwJ1CNq8cf-b8na5SAyq1g/exec',

                initFirebase() {
                    firebase.initializeApp(fbConfig);
                    firebase.auth().onAuthStateChanged(user => {
                        if (user) this.loadUserData(user.uid);
                    });
                },

                async handleLogin() {
                    this.loading = true;
                    try {
                        const res = await firebase.auth().signInWithEmailAndPassword(this.authEmail, this.authPass);
                        this.loadUserData(res.user.uid);
                    } catch (e) {
                        this.errorMsg = "Login Gagal! Akun tidak ditemukan.";
                        this.loading = false;
                    }
                },

                loadUserData(uid) {
                    firebase.database().ref('users/' + uid).once('value', snap => {
                        const data = snap.val();
                        if (data) {
                            this.userName = data.nama;
                            this.role = data.role;
                            this.isLoggedIn = true;
                        }
                        this.loading = false;
                    });
                },

                // FUNGSI REGISTRASI OTOMATIS
                async handleRegister() {
                    if (this.regPass.length < 6) return alert("Password minimal 6 karakter!");
                    this.loading = true;
                    try {
                        // 1. Buat User di Auth
                        const res = await firebase.auth().createUserWithEmailAndPassword(this.regEmail, this.regPass);
                        const newUid = res.user.uid;

                        // 2. Simpan di Database
                        const profile = {
                            nama: this.regNama,
                            role: this.regRole,
                            sekolah: this.regSekolah,
                            createdAt: new Date().toISOString()
                        };
                        await firebase.database().ref('users/' + newUid).set(profile);

                        // 3. Sinkron ke Spreadsheet
                        await this.syncToSheet('Registrasi Akun', `User Baru: ${this.regNama} (${this.regRole})`);

                        alert("Berhasil mendaftarkan " + this.regNama);
                        
                        // Reset Form
                        this.regEmail = ''; this.regPass = ''; this.regNama = '';
                        
                    } catch (e) {
                        alert("Gagal: " + e.message);
                    }
                    this.loading = false;
                },

                async syncToSheet(activity, detail) {
                    try {
                        await fetch(this.sheetUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({
                                nama: this.userName || "System",
                                role: this.role || "Admin",
                                aktivitas: activity,
                                detail: detail,
                                sekolah: this.regSekolah || "-"
                            })
                        });
                    } catch (err) { console.error("Sheet Sync Error"); }
                },

                handleLogout() {
                    firebase.auth().signOut().then(() => location.reload());
                }
            }
        }
    </script>
</body>
</html>
