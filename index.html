<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS TERPADU SMP - PRO VERSION 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-main { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900" x-data="lmsApp()" x-init="initFirebase()">

    <div x-show="!isLoggedIn" x-cloak class="min-h-screen flex items-center justify-center gradient-main px-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <span class="text-5xl">🏛️</span>
                <h2 class="text-3xl font-black text-blue-900 mt-4 tracking-tighter">LMS TERPADU</h2>
                <p class="text-slate-400 font-medium italic">Kota Palu - Digital Portal 2026</p>
            </div>
            <div class="space-y-4">
                <input type="email" x-model="authEmail" placeholder="Email Instansi" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" x-model="authPass" placeholder="Kata Sandi" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="handleLogin()" :disabled="loading" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:scale-[1.02] transition">
                    <span x-text="loading ? 'MENGECEK AKSES...' : 'MASUK KE SISTEM'"></span>
                </button>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak class="min-h-screen flex flex-col">
        <nav class="glass shadow-sm border-b sticky top-0 z-50 px-4">
            <div class="max-w-7xl mx-auto flex justify-between h-20 items-center">
                <div class="flex items-center space-x-4">
                    <div class="bg-blue-600 text-white p-2 rounded-xl font-black">LMS</div>
                    <span class="font-black text-blue-900 text-xl tracking-tight uppercase" x-text="role"></span>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-black text-slate-800" x-text="userName"></p>
                        <p class="text-[10px] font-bold text-blue-500 uppercase" x-text="regSekolah"></p>
                    </div>
                    <button @click="handleLogout()" class="bg-red-50 text-red-600 p-3 rounded-2xl hover:bg-red-100">🚪</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto w-full p-6 flex-grow">
            <div class="mb-8 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex space-x-2">
                    <button @click="currentTab = 'home'" class="px-6 py-2 rounded-xl font-bold text-sm transition" :class="currentTab === 'home' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-white border text-slate-600'">Home</button>
                    <template x-if="['admin', 'kadis'].includes(role)">
                        <button @click="currentTab = 'monitoring'" class="px-6 py-2 rounded-xl font-bold text-sm bg-slate-800 text-white">Monitoring Global</button>
                    </template>
                </div>
            </div>

            <template x-if="role === 'siswa'">
                <div class="grid md:grid-cols-3 gap-6" x-show="currentTab === 'home'">
                    <div class="md:col-span-2 space-y-6">
                        <div class="bg-white p-6 rounded-3xl border shadow-sm">
                            <h3 class="font-black text-lg mb-4">✍️ UJIAN & EXAM</h3>
                            <div class="grid grid-cols-1 gap-3">
                                <template x-for="u in filteredUjian" :key="u.id">
                                    <div class="p-4 bg-orange-50 border border-orange-100 rounded-2xl flex justify-between items-center">
                                        <div>
                                            <p class="font-bold text-orange-900" x-text="u.judul"></p>
                                            <p class="text-[10px] font-black uppercase text-orange-500" x-text="u.kategori"></p>
                                        </div>
                                        <button @click="startUjian(u)" class="bg-orange-600 text-white px-4 py-2 rounded-xl font-bold text-xs">IKUTI UJIAN</button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div @click="openModal('konsultasi')" class="bg-indigo-600 p-6 rounded-3xl text-white cursor-pointer shadow-lg shadow-indigo-100">
                            <h3 class="font-black text-xl text-center">💬 Konsultasi Siswa</h3>
                            <p class="text-xs text-center opacity-80 mt-1">Ke Guru, Kepsek atau Pengawas</p>
                        </div>
                    </div>
                </div>
            </template>

            <template x-if="role === 'guru'">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6" x-show="currentTab === 'home'">
                    <div @click="openModal('upload')" class="bg-white p-6 rounded-3xl border shadow-sm text-center hover:scale-105 transition cursor-pointer">
                        <div class="text-3xl mb-2">📂</div>
                        <h3 class="font-black text-sm">Bahan Ajar</h3>
                    </div>
                    <div @click="openModal('buat-ujian')" class="bg-white p-6 rounded-3xl border border-orange-200 shadow-sm text-center hover:scale-105 transition cursor-pointer">
                        <div class="text-3xl mb-2">📝</div>
                        <h3 class="font-black text-sm">Input Soal Ujian</h3>
                    </div>
                    <div @click="openModal('nilai')" class="bg-white p-6 rounded-3xl border shadow-sm text-center hover:scale-105 transition cursor-pointer">
                        <div class="text-3xl mb-2">📊</div>
                        <h3 class="font-black text-sm">Input Nilai</h3>
                    </div>
                    <div @click="openModal('konsultasi')" class="bg-white p-6 rounded-3xl border shadow-sm text-center hover:scale-105 transition cursor-pointer">
                        <div class="text-3xl mb-2">💬</div>
                        <h3 class="font-black text-sm">Konsultasi Atasan</h3>
                    </div>
                </div>
            </template>

            <div x-show="currentTab === 'monitoring'" class="space-y-6">
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Total Konsultasi</p>
                        <p class="text-3xl font-black text-indigo-600" x-text="totalKonsultasi"></p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Rata-rata Nilai Ujian</p>
                        <p class="text-3xl font-black text-orange-600">82.5</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Sekolah Teraktif</p>
                        <p class="text-xl font-black text-emerald-600">SMPN 1 PALU</p>
                    </div>
                </div>
                
                <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                    <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
                        <h3 class="font-black text-slate-800">Daftar Konsultasi Masuk (Kadis/Admin Only)</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                                <tr>
                                    <th class="p-4">Pengirim</th>
                                    <th class="p-4">Tujuan</th>
                                    <th class="p-4">Isi Pesan</th>
                                    <th class="p-4">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="k in allKonsultasi" :key="k.id">
                                    <tr class="border-t">
                                        <td class="p-4 font-bold" x-text="k.nama_pengirim"></td>
                                        <td class="p-4 uppercase font-black text-blue-600 text-[10px]" x-text="k.tujuan_role"></td>
                                        <td class="p-4 text-slate-600" x-text="k.pesan"></td>
                                        <td class="p-4"><span class="bg-emerald-100 text-emerald-600 px-2 py-1 rounded text-[10px] font-black">TERKIRIM</span></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div x-show="activeModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div @click="activeModal = null" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl relative z-10 overflow-hidden">
            
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h3 class="font-black text-slate-800 uppercase" x-text="activeModal.replace('-', ' ')"></h3>
                <button @click="activeModal = null" class="text-xl">✕</button>
            </div>

            <div class="p-8" x-show="activeModal === 'buat-ujian'">
                <div class="space-y-4">
                    <select x-model="ujianData.kategori" class="w-full p-4 bg-slate-50 border rounded-2xl">
                        <option value="harian">Ujian Harian</option>
                        <option value="mid">Mid Semester</option>
                        <option value="semester">Ujian Semester</option>
                    </select>
                    <input type="text" x-model="ujianData.judul" placeholder="Judul Ujian (Contoh: Matematika Bangun Ruang)" class="w-full p-4 bg-slate-50 border rounded-2xl">
                    <textarea x-model="ujianData.soal" placeholder="Masukkan Link Google Form Soal atau Deskripsi Soal" class="w-full p-4 bg-slate-50 border rounded-2xl h-32"></textarea>
                    <button @click="saveUjian()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-orange-100">PUBLIKASIKAN UJIAN</button>
                </div>
            </div>

            <div class="p-8" x-show="activeModal === 'konsultasi'">
                <div class="space-y-4">
                    <p class="text-xs font-bold text-slate-400">Pilih Tujuan Konsultasi:</p>
                    <div class="flex flex-wrap gap-2">
                        <template x-if="role === 'siswa'">
                            <div class="contents">
                                <button @click="targetKonsul = 'guru'" :class="targetKonsul === 'guru' ? 'bg-blue-600 text-white' : 'bg-slate-100'" class="px-4 py-2 rounded-xl text-xs font-bold">GURU</button>
                                <button @click="targetKonsul = 'kepsek'" :class="targetKonsul === 'kepsek' ? 'bg-blue-600 text-white' : 'bg-slate-100'" class="px-4 py-2 rounded-xl text-xs font-bold">KEPSEK</button>
                                <button @click="targetKonsul = 'pengawas'" :class="targetKonsul === 'pengawas' ? 'bg-blue-600 text-white' : 'bg-slate-100'" class="px-4 py-2 rounded-xl text-xs font-bold">PENGAWAS</button>
                            </div>
                        </template>
                        <template x-if="role === 'guru'">
                            <div class="contents">
                                <button @click="targetKonsul = 'kepsek'" :class="targetKonsul === 'kepsek' ? 'bg-blue-600 text-white' : 'bg-slate-100'" class="px-4 py-2 rounded-xl text-xs font-bold">KEPSEK</button>
                                <button @click="targetKonsul = 'pengawas'" :class="targetKonsul === 'pengawas' ? 'bg-blue-600 text-white' : 'bg-slate-100'" class="px-4 py-2 rounded-xl text-xs font-bold">PENGAWAS</button>
                                <button @click="targetKonsul = 'kadis'" :class="targetKonsul === 'kadis' ? 'bg-blue-600 text-white' : 'bg-slate-100'" class="px-4 py-2 rounded-xl text-xs font-bold">KADIS</button>
                            </div>
                        </template>
                    </div>
                    <textarea x-model="pesanKonsul" placeholder="Tuliskan kendala atau pertanyaan Anda..." class="w-full p-4 bg-slate-50 border rounded-2xl h-32"></textarea>
                    <button @click="sendKonsultasi()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black">KIRIM PESAN</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyAQCxzDVE4Uma-oNSr2wDw2WzcgDrT6ols",
            authDomain: "lmssmpterpadu.firebaseapp.com",
            databaseURL: "https://lmssmpterpadu-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "lmssmpterpadu",
        };

        function lmsApp() {
            return {
                isLoggedIn: false, loading: false, currentTab: 'home', activeModal: null,
                authEmail: '', authPass: '', userName: '', role: '', regSekolah: '',
                filteredUjian: [], allKonsultasi: [], totalKonsultasi: 0,
                ujianData: { kategori: 'harian', judul: '', soal: '' },
                targetKonsul: '', pesanKonsul: '',

                initFirebase() {
                    firebase.initializeApp(fbConfig);
                    firebase.auth().onAuthStateChanged(user => {
                        if (user) this.loadUserData(user.uid);
                    });
                },

                async handleLogin() {
                    this.loading = true;
                    try {
                        const res = await firebase.auth().signInWithEmailAndPassword(this.authEmail, this.authPass);
                        this.loadUserData(res.user.uid);
                    } catch (e) { alert("Login Gagal!"); this.loading = false; }
                },

                loadUserData(uid) {
                    firebase.database().ref('users/' + uid).on('value', snap => {
                        const data = snap.val();
                        if (data) {
                            this.userName = data.nama;
                            this.role = data.role;
                            this.regSekolah = data.sekolah;
                            this.isLoggedIn = true;
                            this.loadInitialData();
                        }
                    });
                },

                loadInitialData() {
                    // Load Ujian
                    firebase.database().ref('ujian').on('value', snap => {
                        const data = snap.val();
                        this.filteredUjian = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
                    });

                    // Load Konsultasi untuk Monitoring (Kadis/Admin)
                    if (['admin', 'kadis'].includes(this.role)) {
                        firebase.database().ref('konsultasi').on('value', snap => {
                            const data = snap.val();
                            this.allKonsultasi = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
                            this.totalKonsultasi = this.allKonsultasi.length;
                        });
                    }
                },

                openModal(type) { this.activeModal = type; },

                async saveUjian() {
                    if(!this.ujianData.judul) return alert("Isi Judul!");
                    await firebase.database().ref('ujian').push({
                        ...this.ujianData,
                        pengunggah: this.userName,
                        sekolah: this.regSekolah,
                        timestamp: Date.now()
                    });
                    this.activeModal = null;
                    alert("Ujian Berhasil Dipublikasikan!");
                },

                async sendKonsultasi() {
                    if(!this.targetKonsul || !this.pesanKonsul) return alert("Pilih tujuan dan isi pesan!");
                    await firebase.database().ref('konsultasi').push({
                        nama_pengirim: this.userName,
                        role_pengirim: this.role,
                        tujuan_role: this.targetKonsul,
                        pesan: this.pesanKonsul,
                        sekolah: this.regSekolah,
                        timestamp: Date.now()
                    });
                    this.pesanKonsul = '';
                    this.activeModal = null;
                    alert("Konsultasi Terkirim!");
                },

                startUjian(u) {
                    alert("Memulai " + u.judul + ". Anda akan diarahkan ke halaman ujian.");
                    if(u.soal.includes('http')) window.open(u.soal, '_blank');
                },

                handleLogout() {
                    firebase.auth().signOut().then(() => location.reload());
                }
            }
        }
    </script>
</body>
</html>
