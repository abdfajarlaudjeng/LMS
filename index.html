<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM LMS TERPADU SMP - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-50 font-sans" x-data="lmsApp()" x-init="initFirebase()">

    <div x-show="!isLoggedIn" x-cloak class="min-h-screen flex items-center justify-center bg-blue-900 px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <div class="inline-block p-3 bg-blue-100 rounded-2xl mb-4">
                    <span class="text-3xl">🎓</span>
                </div>
                <h2 class="text-3xl font-black text-blue-800">LMS SMP</h2>
                <p class="text-gray-400 text-sm">Masuk ke Sistem Pembelajaran Terpadu</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Email Sekolah</label>
                    <input type="email" x-model="authEmail" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Password</label>
                    <input type="password" x-model="authPass" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>
                <button @click="handleLogin()" :disabled="loading" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition disabled:opacity-50">
                    <span x-text="loading ? 'Memproses...' : 'MASUK KE DASHBOARD'"></span>
                </button>
                <p x-show="errorMsg" class="text-red-500 text-xs text-center font-bold" x-text="errorMsg"></p>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak class="min-h-screen flex flex-col">
        <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
                <div class="flex items-center space-x-8">
                    <span class="font-black text-blue-600 text-2xl tracking-tighter">LMS-SMP</span>
                    <div class="hidden md:flex space-x-6 text-sm font-bold text-gray-500">
                        <button @click="currentTab = 'home'" :class="currentTab === 'home' ? 'text-blue-600' : 'hover:text-blue-600'">BERANDA</button>
                        
                        <template x-if="['kadis', 'admin'].includes(role)">
                            <button @click="currentTab = 'register'" :class="currentTab === 'register' ? 'text-green-600' : 'hover:text-green-600'">TAMBAH USER</button>
                        </template>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-black leading-none text-gray-800" x-text="userName"></p>
                        <span class="text-[10px] uppercase font-bold text-blue-500" x-text="role"></span>
                    </div>
                    <button @click="handleLogout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-100 transition">LOGOUT</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto w-full p-4 md:p-8 flex-grow">
            
            <div x-show="currentTab === 'home'">
                <div class="gradient-bg p-8 rounded-3xl text-white mb-8 shadow-xl">
                    <h1 class="text-3xl font-black">Selamat Datang, <span x-text="userName"></span>!</h1>
                    <p class="opacity-90">Sistem Informasi Pembelajaran Terpadu Kota Palu - Update 2026.</p>
                </div>

                <template x-if="role === 'siswa'">
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 space-y-6">
                            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                                <h3 class="font-bold text-lg mb-4 text-blue-800">📚 Literasi Digital</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100 hover:shadow-md cursor-pointer transition">
                                        <span class="text-2xl">📄</span>
                                        <p class="font-bold text-sm mt-2">Bahan Ajar PDF</p>
                                    </div>
                                    <div class="p-4 bg-red-50 rounded-2xl border border-red-100 hover:shadow-md cursor-pointer transition">
                                        <span class="text-2xl">🎥</span>
                                        <p class="font-bold text-sm mt-2">Video Pembelajaran</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <h3 class="font-bold text-lg mb-4 text-red-600">⚠️ Ujian & Tugas</h3>
                            <div class="p-4 bg-gray-50 rounded-xl mb-3">
                                <p class="text-xs font-bold text-gray-400 uppercase">MATEMATIKA</p>
                                <p class="font-bold">Ujian Tengah Semester</p>
                                <button class="mt-3 w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">KERJAKAN</button>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="role === 'guru'">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-white p-6 rounded-2xl border shadow-sm text-center hover:border-blue-500 cursor-pointer">
                            <span class="text-3xl">📝</span>
                            <h3 class="font-bold text-sm mt-2">Input Nilai</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border shadow-sm text-center hover:border-blue-500 cursor-pointer">
                            <span class="text-3xl">📂</span>
                            <h3 class="font-bold text-sm mt-2">Bahan Ajar</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border shadow-sm text-center hover:border-blue-500 cursor-pointer">
                            <span class="text-3xl">📋</span>
                            <h3 class="font-bold text-sm mt-2">Buat Kuis</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border shadow-sm text-center hover:border-blue-500 cursor-pointer">
                            <span class="text-3xl">💬</span>
                            <h3 class="font-bold text-sm mt-2">Konsultasi</h3>
                        </div>
                    </div>
                </template>

                <template x-if="['kadis','pengawas','kepsek'].includes(role)">
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-white p-6 rounded-2xl border shadow-sm flex items-center space-x-4">
                                <div class="p-3 bg-blue-100 rounded-xl text-2xl">👥</div>
                                <div>
                                    <p class="text-xs font-bold text-gray-400">AKTIVITAS SISWA</p>
                                    <p class="text-xl font-black">2,450 User</p>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl border shadow-sm flex items-center space-x-4">
                                <div class="p-3 bg-green-100 rounded-xl text-2xl">📈</div>
                                <div>
                                    <p class="text-xs font-bold text-gray-400">RATA-RATA NILAI</p>
                                    <p class="text-xl font-black">82.5</p>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl border shadow-sm flex items-center space-x-4">
                                <div class="p-3 bg-purple-100 rounded-xl text-2xl">🏫</div>
                                <div>
                                    <p class="text-xs font-bold text-gray-400">GURU AKTIF</p>
                                    <p class="text-xl font-black">128 Guru</p>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <h3 class="font-bold mb-4">Laporan Real-time (Spreadsheet)</h3>
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border">
                                <p class="text-sm font-medium">Klik untuk membuka kertas kerja dinas pendidikan</p>
                                <button @click="window.open('https://docs.google.com/spreadsheets/d/YOUR_SPREADSHEET_ID', '_blank')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold">BUKA DATA</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="currentTab === 'register'" x-cloak class="max-w-2xl mx-auto">
                <div class="bg-white p-8 rounded-3xl border shadow-sm">
                    <h2 class="text-2xl font-black mb-6 text-gray-800 flex items-center">
                        <span class="mr-2">👤</span> Tambah Pengguna Baru
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Email Login</label>
                            <input type="email" x-model="regEmail" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Password</label>
                            <input type="password" x-model="regPass" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Nama Lengkap</label>
                        <input type="text" x-model="regNama" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Role User</label>
                            <select x-model="regRole" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                                <option value="siswa">Siswa</option>
                                <option value="guru">Guru</option>
                                <option value="kepsek">Kepala Sekolah</option>
                                <option value="pengawas">Pengawas</option>
                                <option value="kadis">Kadis Pendidikan</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Instansi/Sekolah</label>
                            <input type="text" x-model="regSekolah" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    <button @click="handleRegister()" :disabled="loading" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black hover:bg-green-700 transition shadow-lg shadow-green-100">
                        <span x-text="loading ? 'MENDAFTARKAN...' : 'SIMPAN PENGGUNA BARU'"></span>
                    </button>
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const fbConfig = {
            apiKey: "AIzaSyAQCxzDVE4Uma-oNSr2wDw2WzcgDrT6ols",
            authDomain: "lmssmpterpadu.firebaseapp.com",
            databaseURL: "https://lmssmpterpadu-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "lmssmpterpadu",
        };

        function lmsApp() {
            return {
                isLoggedIn: false,
                loading: false,
                currentTab: 'home',
                // Login Data
                authEmail: '', authPass: '', errorMsg: '',
                userName: '', role: '',
                // Register Data
                regEmail: '', regPass: '', regNama: '', regRole: 'siswa', regSekolah: '',
                // Google Sheets Webhook URL
                sheetUrl: 'https://script.google.com/macros/s/AKfycbzNxPiGRQ5mMYT_-5aTv1bFwyXqGoKwp53mZciiDdKV6W6UGwJ1CNq8cf-b8na5SAyq1g/exec',

                initFirebase() {
                    firebase.initializeApp(fbConfig);
                    firebase.auth().onAuthStateChanged(user => {
                        if (user) {
                            this.loadUserData(user.uid);
                        } else {
                            this.isLoggedIn = false;
                            this.loading = false;
                        }
                    });
                },

                async handleLogin() {
                    if(!this.authEmail || !this.authPass) return alert("Isi Email & Password!");
                    this.loading = true;
                    this.errorMsg = '';
                    try {
                        const res = await firebase.auth().signInWithEmailAndPassword(this.authEmail, this.authPass);
                        this.loadUserData(res.user.uid);
                    } catch (e) {
                        this.errorMsg = "Gagal Masuk: Email atau Password salah.";
                        this.loading = false;
                    }
                },

                loadUserData(uid) {
                    firebase.database().ref('users/' + uid).once('value', snap => {
                        const data = snap.val();
                        if (data) {
                            this.userName = data.nama;
                            this.role = data.role; // siswa, guru, kadis, dll
                            this.isLoggedIn = true;
                            // Kirim log ke sheet
                            this.syncToSheet('Login', 'User masuk ke sistem');
                        } else {
                            this.errorMsg = "Profil tidak ditemukan di database.";
                            firebase.auth().signOut();
                        }
                        this.loading = false;
                    });
                },

                async handleRegister() {
                    if (this.regPass.length < 6) return alert("Password minimal 6 karakter!");
                    if (!this.regEmail || !this.regNama) return alert("Lengkapi data!");
                    
                    this.loading = true;
                    try {
                        // 1. Buat akun di Auth
                        const res = await firebase.auth().createUserWithEmailAndPassword(this.regEmail, this.regPass);
                        const newUid = res.user.uid;

                        // 2. Simpan profil ke Realtime Database
                        await firebase.database().ref('users/' + newUid).set({
                            nama: this.regNama,
                            role: this.regRole,
                            sekolah: this.regSekolah,
                            createdAt: new Date().toISOString()
                        });

                        // 3. Log ke Spreadsheet
                        await this.syncToSheet('Registrasi Akun', `User Baru: ${this.regNama} (${this.regRole})`);

                        alert("Berhasil mendaftarkan: " + this.regNama);
                        
                        // Reset Form
                        this.regEmail = ''; this.regPass = ''; this.regNama = ''; this.regSekolah = '';
                        
                    } catch (e) {
                        alert("Pendaftaran Gagal: " + e.message);
                    }
                    this.loading = false;
                },

                async syncToSheet(activity, detail) {
                    try {
                        fetch(this.sheetUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({
                                nama: this.userName || "System",
                                role: this.role || "Admin",
                                aktivitas: activity,
                                detail: detail,
                                sekolah: this.regSekolah || "SMP Pusat"
                            })
                        });
                    } catch (err) { console.error("Sinkronisasi Sheet Gagal"); }
                },

                handleLogout() {
                    if(confirm("Apakah Anda ingin keluar?")) {
                        firebase.auth().signOut().then(() => {
                            location.reload();
                        });
                    }
                }
            }
        }
    </script>
</body>
</html>
