<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM LMS TERPADU SMP - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .exam-overlay { background: #0f172a; position: fixed; inset: 0; z-index: 999; color: white; }
    </style>
</head>
<body class="bg-gray-50" x-data="lmsApp()" x-init="initFirebase()">

    <div x-show="!isLoggedIn" x-cloak class="min-h-screen flex items-center justify-center bg-blue-800 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-bold text-blue-700">LMS SMP</h2>
                <p class="text-gray-500">Masuk dengan akun terdaftar</p>
            </div>
            <div class="space-y-4">
                <input type="email" x-model="authEmail" placeholder="Email" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" x-model="authPass" placeholder="Password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="handleLogin()" :disabled="loading" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">
                    <span x-text="loading ? 'Memproses...' : 'Login'"></span>
                </button>
                <p x-show="errorMsg" class="text-red-500 text-xs text-center" x-text="errorMsg"></p>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn" x-cloak>
        <nav class="bg-white shadow-sm border-b sticky top-0 z-50" x-data="{ mobileOpen: false }">
            <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
                <div class="flex items-center space-x-8">
                    <span class="font-black text-blue-600 text-xl">LMS-SMP</span>
                    <div class="hidden md:flex space-x-4 text-sm font-medium text-gray-600">
                        <a href="#" class="hover:text-blue-600">Beranda</a>
                        <template x-if="role === 'siswa'">
                            <div class="flex space-x-4">
                                <a href="#" class="hover:text-blue-600">Literasi</a>
                                <a href="#" class="hover:text-blue-600">Tugas & Ujian</a>
                            </div>
                        </template>
                        <template x-if="role === 'guru'">
                            <div class="flex space-x-4">
                                <a href="#" class="hover:text-blue-600">Bahan Ajar</a>
                                <a href="#" class="hover:text-blue-600">Kelola Ujian</a>
                            </div>
                        </template>
                        <template x-if="['kepsek','pengawas','kadis'].includes(role)">
                            <a href="#" class="text-purple-600 font-bold">Laporan Monitoring</a>
                        </template>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-bold leading-none" x-text="userName"></p>
                        <span class="text-[10px] uppercase font-bold text-gray-400" x-text="role"></span>
                    </div>
                    <button @click="handleLogout()" class="text-red-500 hover:bg-red-50 p-2 rounded-lg">Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            
            <template x-if="role === 'siswa'">
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 space-y-6">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border">
                            <h3 class="font-bold text-lg mb-4">Dashboard Literasi</h3>
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                <button @click="openMedia('Drive Link')" class="p-4 bg-blue-50 rounded-xl flex flex-col items-center">
                                    <span class="text-2xl">📄</span> <span class="text-xs font-bold mt-2">DOCS/PPT</span>
                                </button>
                                <button @click="openMedia('Youtube Link')" class="p-4 bg-red-50 rounded-xl flex flex-col items-center">
                                    <span class="text-2xl">🎬</span> <span class="text-xs font-bold mt-2">VIDEO</span>
                                </button>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border">
                            <h3 class="font-bold text-lg mb-4">Ujian Tersedia</h3>
                            <div class="border rounded-xl p-4 flex justify-between items-center bg-gray-50">
                                <div>
                                    <p class="font-bold">Ujian Mid Semester - Matematika</p>
                                    <span class="text-xs text-red-500 font-bold">Durasi: 90 Menit</span>
                                </div>
                                <button @click="startExam('Mid Semester')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">Kerjakan</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <template x-if="role === 'guru'">
                <div class="space-y-6">
                    <div class="bg-white p-8 rounded-2xl shadow-sm border max-w-2xl mx-auto">
                        <h2 class="text-xl font-bold mb-6">Panel Input Guru</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold mb-1">MATA PELAJARAN / KELAS</label>
                                <input type="text" placeholder="Contoh: Matematika - Kelas 8A" class="w-full p-2 border rounded-lg">
                            </div>
                            <div>
                                <label class="block text-xs font-bold mb-1">LINK BAHAN AJAR (G-DRIVE / YT)</label>
                                <input type="text" placeholder="https://..." class="w-full p-2 border rounded-lg">
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <button class="bg-blue-100 text-blue-700 py-2 rounded-lg font-bold text-xs">INPUT KUIS</button>
                                <button class="bg-green-100 text-green-700 py-2 rounded-lg font-bold text-xs">INPUT TUGAS</button>
                                <button class="bg-red-100 text-red-700 py-2 rounded-lg font-bold text-xs">INPUT UJIAN</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <template x-if="['kepsek','pengawas','kadis'].includes(role)">
                <div class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <p class="text-gray-400 text-xs font-bold uppercase">Kehadiran Siswa</p>
                            <h4 class="text-2xl font-black text-blue-600">98.2%</h4>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <p class="text-gray-400 text-xs font-bold uppercase">Input Materi Guru</p>
                            <h4 class="text-2xl font-black text-green-600">124</h4>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b">
                                <tr class="text-xs uppercase font-bold text-gray-500">
                                    <th class="p-4">Nama</th>
                                    <th class="p-4">Sekolah</th>
                                    <th class="p-4">Aktivitas</th>
                                    <th class="p-4">Status</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                <tr class="border-b">
                                    <td class="p-4 font-bold">Siswa - Rian Utama</td>
                                    <td class="p-4">SMPN 01</td>
                                    <td class="p-4">Mengerjakan Ujian Harian</td>
                                    <td class="p-4"><span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-black uppercase">In Progress</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

        </main>
    </div>

    <div x-show="examActive" x-cloak class="exam-overlay flex flex-col">
        <header class="p-4 bg-red-900 flex justify-between items-center shadow-xl">
            <h2 class="font-black tracking-tighter" x-text="'EXAM: ' + currentExamName"></h2>
            <div class="bg-white text-red-900 px-6 py-1 rounded-full font-mono text-2xl font-bold" x-text="timerStr"></div>
        </header>
        <div class="flex-grow p-4 md:p-12 overflow-y-auto">
            <div class="max-w-2xl mx-auto bg-white text-black p-8 rounded-3xl shadow-2xl">
                <div class="mb-8">
                    <p class="text-gray-400 text-xs font-bold mb-2">PERTANYAAN 1 DARI 20</p>
                    <h3 class="text-xl font-medium">Berapakah hasil dari 15% dari 200.000?</h3>
                </div>
                <div class="space-y-3">
                    <button class="w-full p-4 border-2 rounded-2xl text-left hover:bg-blue-50 font-bold">A. 30.000</button>
                    <button class="w-full p-4 border-2 rounded-2xl text-left hover:bg-blue-50 font-bold">B. 25.000</button>
                    <button class="w-full p-4 border-2 rounded-2xl text-left hover:bg-blue-50 font-bold">C. 15.000</button>
                </div>
                <div class="mt-12 flex justify-between">
                    <button @click="finishExam()" class="bg-gray-200 px-8 py-3 rounded-xl font-bold">LEWATI</button>
                    <button @click="finishExam()" class="bg-blue-600 text-white px-12 py-3 rounded-xl font-bold shadow-lg">SIMPAN & LANJUT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const fbConfig = {
            apiKey: "GANTI_DENGAN_API_KEY_ANDA",
            authDomain: "PROJECT_ANDA.firebaseapp.com",
            databaseURL: "https://PROJECT_ANDA.firebaseio.com",
            projectId: "PROJECT_ANDA",
        };

        function lmsApp() {
            return {
                isLoggedIn: false,
                loading: false,
                authEmail: '',
                authPass: '',
                errorMsg: '',
                userName: '',
                role: '', // siswa, guru, kepsek, pengawas, kadis
                examActive: false,
                currentExamName: '',
                timerStr: '90:00',
                sheetUrl: 'https://script.google.com/macros/s/AKfycbzNxPiGRQ5mMYT_-5aTv1bFwyXqGoKwp53mZciiDdKV6W6UGwJ1CNq8cf-b8na5SAyq1g/exec',

                initFirebase() {
                    firebase.initializeApp(fbConfig);
                    // Cek Sesi
                    firebase.auth().onAuthStateChanged(user => {
                        if (user) this.loadUserData(user.uid);
                    });
                },

                async handleLogin() {
                    this.loading = true;
                    this.errorMsg = '';
                    try {
                        const res = await firebase.auth().signInWithEmailAndPassword(this.authEmail, this.authPass);
                        this.loadUserData(res.user.uid);
                    } catch (e) {
                        this.errorMsg = "Login Gagal! Periksa Email/Password.";
                        this.loading = false;
                    }
                },

                loadUserData(uid) {
                    firebase.database().ref('users/' + uid).once('value', snap => {
                        const data = snap.val();
                        if (data) {
                            this.userName = data.nama;
                            this.role = data.role;
                            this.isLoggedIn = true;
                            // Kirim data login ke spreadsheet
                            this.syncToSheet('Login', data.nama + ' has logged in');
                        }
                        this.loading = false;
                    });
                },

                handleLogout() {
                    firebase.auth().signOut().then(() => {
                        this.isLoggedIn = false;
                        location.reload();
                    });
                },

                startExam(name) {
                    this.currentExamName = name;
                    this.examActive = true;
                    this.startTimer(90);
                },

                startTimer(minutes) {
                    let totalSeconds = minutes * 60;
                    let intv = setInterval(() => {
                        let m = Math.floor(totalSeconds / 60);
                        let s = totalSeconds % 60;
                        this.timerStr = `${m}:${s < 10 ? '0'+s : s}`;
                        if (totalSeconds <= 0) {
                            clearInterval(intv);
                            this.finishExam();
                        }
                        totalSeconds--;
                    }, 1000);
                },

                finishExam() {
                    this.examActive = false;
                    alert("Ujian Selesai! Skor Anda telah terkirim.");
                    this.syncToSheet('Ujian', 'Skor: 85');
                },

                openMedia(type) {
                    alert('Membuka file ' + type + ' dari Google Drive...');
                },

                async syncToSheet(activity, detail) {
                    if(!this.sheetUrl.includes('GANTI')) {
                        fetch(this.sheetUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({
                                nama: this.userName,
                                role: this.role,
                                aktivitas: activity,
                                detail: detail
                            })
                        });
                    }
                }
            }
        }
    </script>
</body>
</html>
